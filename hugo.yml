module:
  mounts:
    - source: archetypes
      target: archetypes
    - source: assets
      target: assets
    - source: content
      target: content
    - source: i18n
      target: i18n
    - source: layouts
      target: layouts

params:

  # Hugolify admin
  admin:
    collections:
      posts:
        enable: true
        filter:
          - field: isIndex
            value: false
        icon:
          bootstrap_icons: stickies
          iconoir: post
          material_icons: feed
          material_symbols: news
          lucide: sticky-note
        sortable: "[commit_date, title]"
        summary: "{{title}} - {{date | date('YYYY-MM-DD')}}"
  
  # Image
  posts:
    thumbnail:
      desktop: '416x179'
      desktop_large: '636x273'
      mobile: '300x129'
      scrollsnap: '240x103'
      sizes: 100vw, 50vw, 33vw

# Default
permalinks:
  page:
    posts: /news/:year-:month-:day-:slug/
  section:
    posts: /news/
